<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>D.O.U.G. CRM v11</title>
<link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@300;400;500;600;700&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet">
<script src="https://cdnjs.cloudflare.com/ajax/libs/Chart.js/4.4.1/chart.umd.min.js"></script>
<style>
:root {
  --bg: #0a0a0f;
  --bg2: #111118;
  --bg3: #1a1a24;
  --bg4: #22222e;
  --green: #00c896;
  --green2: #00a87e;
  --green-dim: rgba(0,200,150,0.08);
  --green-border: rgba(0,200,150,0.2);
  --text: #e8e8f0;
  --text2: #9090a8;
  --text3: #5a5a70;
  --border: rgba(255,255,255,0.06);
  --border2: rgba(255,255,255,0.12);
  --font-main: 'Space Grotesk', sans-serif;
  --font-mono: 'JetBrains Mono', monospace;
  --shadow: 0 8px 32px rgba(0,0,0,0.4);
}

* { box-sizing: border-box; margin: 0; padding: 0; }
body {
  background: var(--bg);
  color: var(--text);
  font-family: var(--font-main);
  padding: 24px;
  overflow-x: hidden;
}

.topbar {
  display: flex;
  justify-content: space-between;
  align-items: center;
  margin-bottom: 24px;
  background: var(--bg2);
  padding: 16px 24px;
  border-radius: 12px;
  border: 1px solid var(--border);
  box-shadow: var(--shadow);
}
.logo-area { display: flex; align-items: center; gap: 12px; }
.logo-tag {
  background: var(--green-dim);
  color: var(--green);
  border: 1px solid var(--green-border);
  padding: 4px 8px;
  border-radius: 6px;
  font-family: var(--font-mono);
  font-size: 12px;
  font-weight: 600;
}
.logo-title { font-size: 20px; font-weight: 600; letter-spacing: -0.5px; }

.btn-trigger {
  background: var(--green);
  color: #000;
  border: none;
  padding: 10px 20px;
  border-radius: 8px;
  font-weight: 600;
  cursor: pointer;
  display: flex;
  align-items: center;
  gap: 8px;
  font-family: var(--font-main);
  font-size: 14px;
  transition: all 0.2s ease;
}
.btn-trigger:hover:not(:disabled) { background: var(--green2); transform: translateY(-1px); }
.btn-trigger:disabled { background: var(--bg4); color: var(--text3); cursor: not-allowed; }

.crm-grid {
  display: grid;
  grid-template-columns: 340px 1fr;
  gap: 24px;
  height: calc(100vh - 120px);
}

.panel-left {
  background: var(--bg2);
  border-radius: 12px;
  border: 1px solid var(--border);
  display: flex;
  flex-direction: column;
  overflow: hidden;
  box-shadow: var(--shadow);
}
.panel-header {
  padding: 16px;
  border-bottom: 1px solid var(--border);
  display: flex;
  justify-content: space-between;
  align-items: center;
}
.panel-title { font-size: 14px; font-weight: 600; text-transform: uppercase; letter-spacing: 1px; color: var(--text2); }
.lead-counter { font-family: var(--font-mono); background: var(--bg4); padding: 2px 8px; border-radius: 4px; font-size: 12px; }

.search-box { padding: 12px 16px; border-bottom: 1px solid var(--border); }
.search-input {
  width: 100%;
  background: var(--bg3);
  border: 1px solid var(--border);
  padding: 10px 14px;
  border-radius: 8px;
  color: var(--text);
  font-family: var(--font-main);
  font-size: 14px;
  outline: none;
}
.search-input:focus { border-color: var(--green-border); }

.lead-list { flex: 1; overflow-y: auto; padding: 8px; display: flex; flex-direction: column; gap: 4px; }
.lead-item {
  padding: 12px 16px;
  border-radius: 8px;
  cursor: pointer;
  transition: all 0.15s ease;
  border: 1px solid transparent;
}
.lead-item:hover { background: var(--bg3); }
.lead-item.active { background: var(--green-dim); border-color: var(--green-border); }
.lead-name { font-size: 15px; font-weight: 500; margin-bottom: 4px; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
.lead-sub { font-size: 12px; color: var(--text2); }

.status-badge {
  display: inline-block;
  padding: 2px 6px;
  border-radius: 4px;
  font-size: 10px;
  font-family: var(--font-mono);
  font-weight: 600;
  text-transform: uppercase;
  margin-top: 6px;
}
.status-novo { background: rgba(0,200,150,0.1); color: var(--green); border: 1px solid rgba(0,200,150,0.2); }
.status-abordado { background: rgba(255,180,0,0.1); color: #ffb400; border: 1px solid rgba(255,180,0,0.2); }
.status-reuniao { background: rgba(0,150,255,0.1); color: #0096ff; border: 1px solid rgba(0,150,255,0.2); }
.status-fechado { background: rgba(200,0,255,0.1); color: #c800ff; border: 1px solid rgba(200,0,255,0.2); }
.status-perdido { background: rgba(255,0,50,0.1); color: #ff0032; border: 1px solid rgba(255,0,50,0.2); }

.panel-right { display: flex; flex-direction: column; gap: 24px; overflow-y: auto; padding-right: 4px; }

.view-empty {
  flex: 1;
  background: var(--bg2);
  border-radius: 12px;
  border: 1px solid var(--border);
  display: flex;
  flex-direction: column;
  justify-content: center;
  align-items: center;
  gap: 12px;
  color: var(--text3);
}

.workspace-layout { display: grid; grid-template-columns: 1fr 400px; gap: 24px; height: 100%; }

.main-workspace {
  background: var(--bg2);
  border-radius: 12px;
  border: 1px solid var(--border);
  padding: 32px;
  box-shadow: var(--shadow);
  display: flex;
  flex-direction: column;
  gap: 28px;
}

.lead-header-area {
  display: flex;
  justify-content: space-between;
  align-items: flex-start;
  border-bottom: 1px solid var(--border);
  padding-bottom: 24px;
}
.lead-title-big { font-size: 26px; font-weight: 700; color: var(--text); letter-spacing: -0.5px; margin-bottom: 6px; }
.lead-meta-big { font-size: 14px; color: var(--text2); display: flex; gap: 16px; }

.control-group { display: flex; flex-direction: column; gap: 8px; }
.control-label { font-size: 12px; font-weight: 600; text-transform: uppercase; letter-spacing: 1px; color: var(--text2); }
.select-custom {
  background: var(--bg3);
  border: 1px solid var(--border);
  padding: 12px;
  border-radius: 8px;
  color: var(--text);
  font-family: var(--font-main);
  font-size: 14px;
  outline: none;
}

.btn-save {
  background: var(--green);
  color: #000;
  border: none;
  padding: 14px;
  border-radius: 8px;
  font-weight: 600;
  cursor: pointer;
  font-family: var(--font-main);
  font-size: 15px;
  text-align: center;
  transition: all 0.2s ease;
}
.btn-save:hover { background: var(--green2); }

.obs-input {
  width: 100%;
  height: 120px;
  background: var(--bg3);
  border: 1px solid var(--border);
  padding: 14px;
  border-radius: 8px;
  color: var(--text);
  font-family: var(--font-main);
  font-size: 14px;
  outline: none;
  resize: none;
}

.tel-box {
  background: var(--bg3);
  border: 1px solid var(--border);
  border-radius: 8px;
  padding: 16px;
  display: flex;
  justify-content: space-between;
  align-items: center;
}
.tel-num { font-family: var(--font-mono); font-size: 16px; color: var(--text); }
.btn-wpp {
  background: #25D366;
  color: #000;
  padding: 8px 16px;
  border-radius: 6px;
  text-decoration: none;
  font-weight: 600;
  font-size: 13px;
  display: flex;
  align-items: center;
  gap: 6px;
}

.side-panel { display: flex; flex-direction: column; gap: 24px; }

.side-card {
  background: var(--bg2);
  border-radius: 12px;
  border: 1px solid var(--border);
  padding: 20px;
  box-shadow: var(--shadow);
}
.side-card-title { font-size: 13px; font-weight: 600; text-transform: uppercase; letter-spacing: 1px; color: var(--text2); margin-bottom: 16px; }

.script-box {
  background: var(--bg3);
  border: 1px solid var(--border);
  border-radius: 8px;
  padding: 16px;
  font-size: 14px;
  line-height: 1.5;
  color: var(--text);
  cursor: pointer;
  position: relative;
  transition: background 0.2s ease;
}
.script-box:hover { background: var(--bg4); }
.script-blur { filter: blur(4px); opacity: 0.4; }
.script-overlay {
  position: absolute;
  top: 0; left: 0;
  width: 100%; height: 100%;
  display: flex;
  justify-content: center;
  align-items: center;
  background: rgba(10,10,15,0.6);
  font-weight: 600;
  color: var(--green);
  font-size: 13px;
  border-radius: 8px;
}

.prod-grid { display: grid; grid-template-columns: repeat(3, 1fr); gap: 24px; }
.prod-card {
  background: var(--bg2);
  border-radius: 12px;
  border: 1px solid var(--border);
  padding: 24px;
  box-shadow: var(--shadow);
  display: flex;
  flex-direction: column;
  justify-content: space-between;
}
.prod-card.total { grid-column: span 3; }
.prod-title { font-size: 13px; font-weight: 600; text-transform: uppercase; letter-spacing: 1px; color: var(--text2); margin-bottom: 8px; }
.prod-numbers { display: flex; align-items: baseline; gap: 6px; margin-bottom: 12px; }
.prod-current { font-size: 32px; font-weight: 700; color: var(--green); font-family: var(--font-mono); }
.prod-meta { font-size: 14px; color: var(--text3); font-family: var(--font-mono); }
.prod-pct { color: var(--text2); margin-left: 8px; font-weight: 600; }
.prod-sub { font-size: 12px; color: var(--text2); margin-bottom: 12px; }
.prod-bar-wrap { width: 100%; height: 6px; background: var(--bg4); border-radius: 3px; overflow: hidden; margin-bottom: 12px; }
.prod-bar { height: 100%; background: var(--green); border-radius: 3px; width: 0%; transition: width 0.4s ease; }
.prod-status { font-family: var(--font-mono); font-size: 11px; font-weight: 600; color: var(--green); }
.prod-deadline { font-size: 11px; color: var(--text3); text-align: right; margin-top: 4px; }

.charts-grid { display: grid; grid-template-columns: repeat(3, 1fr); gap: 24px; }
.chart-card {
  background: var(--bg2);
  border-radius: 12px;
  border: 1px solid var(--border);
  padding: 24px;
  box-shadow: var(--shadow);
}
.chart-card.full { grid-column: span 1; }
.chart-title { font-size: 13px; font-weight: 600; text-transform: uppercase; letter-spacing: 1px; color: var(--text2); margin-bottom: 20px; }
.chart-wrap { position: relative; width: 100%; height: 200px; }

.funil-wrap { display: flex; flex-direction: column; gap: 10px; padding: 10px 0; }
.funil-stage { display: flex; align-items: center; height: 32px; position: relative; }
.funil-label { width: 90px; font-size: 12px; color: var(--text2); font-weight: 500; }
.funil-bar-bg { flex: 1; height: 100%; background: var(--bg4); border-radius: 4px; overflow: hidden; position: relative; }
.funil-bar { height: 100%; background: var(--green-dim); border-right: 2px solid var(--green); width: 0%; transition: width 0.4s ease; }
.funil-num { position: absolute; right: 12px; top: 7px; font-family: var(--font-mono); font-size: 12px; font-weight: 600; color: var(--text); }

.toast {
  position: fixed;
  bottom: 24px;
  right: 24px;
  background: var(--bg3);
  border: 1px solid var(--green-border);
  padding: 16px 24px;
  border-radius: 8px;
  box-shadow: var(--shadow);
  display: flex;
  align-items: center;
  gap: 12px;
  transform: translateY(100px);
  opacity: 0;
  transition: all 0.3s cubic-bezier(0.175, 0.885, 0.32, 1.275);
  z-index: 10000;
}
.toast.show { transform: translateY(0); opacity: 1; }
.toast-icon { color: var(--green); font-size: 18px; }
.toast-msg { font-size: 14px; font-weight: 500; }
</style>
</head>
<body>

  <div class="topbar">
    <div class="logo-area">
      <div class="logo-tag">CORE v11</div>
      <div class="logo-title">D.O.U.G. System</div>
    </div>
    <button class="btn-trigger" id="btn-trigger" onclick="dispararAutomacao()">
      ⚡ Gerar Leads
    </button>
  </div>

  <div class="crm-grid">
    <div class="panel-left">
      <div class="panel-header">
        <div class="panel-title">Filtro de Prospecção</div>
        <div class="lead-counter" id="lead-counter">00</div>
      </div>
      <div class="search-box">
        <input type="text" class="search-input" id="search-input" placeholder="Buscar por empresa, nicho ou cidade..." oninput="filtrarLeads()">
      </div>
  
      <div class="lead-list" id="lead-list"></div>
    </div>

    <div class="panel-right" id="panel-right">
      <div class="view-empty" id="view-empty">
        <svg width="48" height="48" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5"><path d="M16 18l6-6-6-6M8 6l-6 6 6 6"/></svg>
        <div style="font-size:14px; font-weight:500;">Selecione uma empresa para iniciar a abordagem</div>
      </div>
    </div>
  </div>

  <div class="toast" id="toast">
    <div class="toast-icon">✓</div>
    <div class="toast-msg" id="toast-msg">Sucesso!</div>
  </div>

<script>
const WEB_APP_URL = "https://script.google.com/macros/s/AKfycbxkU1uTaynJdaFNkQkDyAnCt7GO-9-88GO7KE9R_qCbGd24fCq5F0l4tuqFDCOlMOn3/exec";
const WEBHOOK_URL = "https://doug.petafetivo.com/webhook/gerar-leads";

let allLeads = [];
let currentLead = null;
let chartStatusInstance = null;
let chartNichoInstance = null;
let rodadaStatus = { bait: 0, reveal: 0, total: 0 };

async function init() {
  await carregarLeads();
  inicializarRodada();
}

function inicializarRodada() {
  const salvo = localStorage.getItem('doug_rodada');
  if (salvo) {
    const parsed = JSON.parse(salvo);
    const hoje = new Date().toLocaleDateString();
    if (parsed.data === hoje) {
      rodadaStatus = parsed;
    } else {
      rodadaStatus = { data: hoje, bait: 0, reveal: 0, total: 0 };
      localStorage.setItem('doug_rodada', JSON.stringify(rodadaStatus));
    }
  } else {
    rodadaStatus = { data: new Date().toLocaleDateString(), bait: 0, reveal: 0, total: 0 };
    localStorage.setItem('doug_rodada', JSON.stringify(rodadaStatus));
  }
}

async function carregarLeads() {
  try {
    const res = await fetch(`${WEB_APP_URL}?action=getLeads`);
    const data = await res.json();
    allLeads = data.leads || [];
    renderLeads(allLeads);
    atualizarDashboard();
  } catch (e) {
    showToast("Erro ao carregar dados da planilha");
  }
}

function renderLeads(leads) {
  const container = document.getElementById('lead-list');
  document.getElementById('lead-counter').innerText = String(leads.length).padStart(2, '0');
  container.innerHTML = '';
  leads.forEach(lead => {
    const item = document.createElement('div');
    item.className = `lead-item ${currentLead && currentLead.id === lead.id ? 'active' : ''}`;
    item.onclick = () => selecionarLead(lead);
    
    item.innerHTML = `
      <div class="lead-name">${lead.Nome}</div>
      <div class="lead-sub">${lead.Nicho || ''} · ${lead.Bairro || ''} · ${lead.Cidade || ''}</div>
      <div class="status-badge status-${String(lead.Status).toLowerCase()}">${lead.Status || 'Novo'}</div>
    `;
    container.appendChild(item);
  });
}

function filtrarLeads() {
  const query = document.getElementById('search-input').value.toLowerCase().trim();
  if (!query) return renderLeads(allLeads);
  const filtrados = allLeads.filter(l => 
    String(l.Nome).toLowerCase().includes(query) ||
    String(l.Nicho).toLowerCase().includes(query) ||
    String(l.Cidade).toLowerCase().includes(query)
  );
  renderLeads(filtrados);
}

function selecionarLead(lead) {
  currentLead = lead;
  renderLeads(document.getElementById('search-input').value ? allLeads.filter(l => 
    String(l.Nome).toLowerCase().includes(document.getElementById('search-input').value.toLowerCase())
  ) : allLeads);
  const rightPanel = document.getElementById('panel-right');
  rightPanel.innerHTML = `
    <div class="workspace-layout">
      <div class="main-workspace">
        <div class="lead-header-area">
          <div>
            <div class="lead-title-big">${lead.Nome}</div>
            <div class="lead-meta-big">
              <span>★ ${lead.Avaliacao || '0.0'} (${lead.TotalAvaliacoes || 0} avaliações)</span>
              <span>•</span>
              <span>${lead.Nicho}</span>
              <span>•</span>
              <span>${lead.Cidade}</span>
            </div>
          </div>
          <div class="status-badge status-${String(lead.Status).toLowerCase()}" style="font-size:12px; padding:4px 10px;">
             ${lead.Status || 'Novo'}
          </div>
        </div>

        <div class="tel-box">
          <div>
            <div style="font-size:11px; color:var(--text2); font-weight:600; text-transform:uppercase; margin-bottom:4px;">Telefone de Contato</div>
            <div class="tel-num">${lead.Telefone}</div>
          </div>
          <a href="https://wa.me/${String(lead.Telefone).replace(/[^0-9]/g,'')}" target="_blank" class="btn-wpp" onclick="contabilizarAbordagem()">
             <svg width="16" height="16" viewBox="0 0 24 24" fill="currentColor"><path d="M.057 24l1.687-6.163c-1.041-1.804-1.588-3.849-1.587-5.946C.003 5.324 5.328 0 11.859 0c3.166.001 6.141 1.233 8.378 3.471 2.238 2.238 3.469 5.214 3.47 8.381-.003 6.535-5.328 11.86-11.859 11.86-2.004-.001-3.973-.51-5.716-1.483zm6.495-3.327l.386.23c1.5.892 3.21 1.364 4.961 1.365 5.513 0 10.002-4.49 10.006-10.004.002-2.672-1.037-5.184-2.926-7.073-1.89-1.89-4.401-2.93-7.076-2.932-5.517 0-10.006 4.49-10.01 10.005-.001 1.79.469 3.538 1.362 5.035l.254.427-1.01 3.694z"/></svg>
            Abrir WhatsApp
          </a>
        </div>

        <div class="control-group">
          <div class="control-label">Anotações e Histórico</div>
          <textarea class="obs-input" id="obs-input" placeholder="Digite aqui o resumo das conversas, propostas ou objeções...">${lead.Observacao || ''}</textarea>
        </div>

        <div style="display:grid; grid-template-columns: 1fr 1fr; gap:16px;">
          <div class="control-group">
            <div class="control-label">Canal de Contato</div>
            <select class="select-custom" id="canal-input">
              <option value="" ${!lead.Canal ? 'selected' : ''}>Não definido</option>
              <option value="WhatsApp" ${lead.Canal === 'WhatsApp' ? 'selected' : ''}>WhatsApp</option>
              <option value="Ligação" ${lead.Canal === 'Ligação' ? 'selected' : ''}>Ligação</option>
              <option value="Presencial" ${lead.Canal === 'Presencial' ? 'selected' : ''}>Presencial</option>
            </select>
          </div>
          <div class="control-group">
            <div class="control-label">Estágio do Funil</div>
            <select class="select-custom" id="status-input">
              <option value="Novo" ${lead.Status === 'Novo' ? 'selected' : ''}>Novo</option>
              <option value="Abordado" ${lead.Status === 'Abordado' ? 'selected' : ''}>Abordado</option>
              <option value="Reuniao" ${lead.Status === 'Reuniao' ? 'selected' : ''}>Reunião</option>
              <option value="Fechado" ${lead.Status === 'Fechado' ? 'selected' : ''}>Fechado</option>
              <option value="Perdido" ${lead.Status === 'Perdido' ? 'selected' : ''}>Perdido</option>
            </select>
          </div>
        </div>

        <button class="btn-save" onclick="salvarAlteracoesLead()">Salvar Alterações</button>
      </div>

      <div class="side-panel">
        <div class="side-card">
          <div class="side-card-title">Abordagem 1 — Mensagem de Impacto (Bait)</div>
          <div class="script-box" onclick="copiarTexto(this)">
             Olá, tudo bem? Sou o D.O.U.G., assistente virtual do Douglas.
Notei que a ${lead.Nome} possui excelentes avaliações em ${lead.Cidade}. Vocês teriam capacidade para receber mais 15 a 20 novos clientes de ${lead.Nicho} este mês através de automação?
          </div>
        </div>
        <div class="side-card">
          <div class="side-card-title">Abordagem 2 — Apresentação Técnica (Reveal)</div>
          <div class="script-box script-blur-logic" id="card-reveal" onclick="copiarTexto(this)">
            <div class="script-blur" id="text-reveal">Perfeito!
Nós desenvolvemos sistemas inteligentes sob medida que automatizam o atendimento do seu WhatsApp, qualificam o cliente e agendam o horário direto na sua planilha, sem que você precise perder tempo digitando.
Podemos agendar uma demonstração de 10 minutos na próxima terça?</div>
            <div class="script-overlay" id="overlay-reveal">⚡ Clique para liberar após enviar o Bait</div>
          </div>
        </div>
      </div>
    </div>

    <div class="prod-grid">
      <div class="prod-card">
        <div class="prod-title">Abordagens (Bait)</div>
        <div class="prod-numbers">
          <div class="prod-current" id="prod-bait">0</div>
          <div class="prod-meta">/ 20</div>
        </div>
        <div class="prod-sub">Primeiro contato diário</div>
        <div class="prod-bar-wrap">
          <div class="prod-bar" id="prod-bait-bar" style="width:0%"></div>
        </div>
        <div class="prod-status" id="prod-bait-status">◉ EM PROGRESSO</div>
      </div>

      <div class="prod-card">
        <div class="prod-title">Aprofundamentos (Reveal)</div>
        <div class="prod-numbers">
          <div class="prod-current" id="prod-reveal">0</div>
          <div class="prod-meta">/ 20</div>
        </div>
        <div class="prod-sub">Apresentação da Automação</div>
        <div class="prod-bar-wrap">
          <div class="prod-bar" id="prod-reveal-bar" style="width:0%"></div>
        </div>
        <div class="prod-status" id="prod-reveal-status">◉ EM PROGRESSO</div>
      </div>

      <div class="prod-card">
        <div class="prod-title">Produtividade Diária</div>
        <div class="prod-numbers">
          <div class="prod-current" id="prod-dia">0</div>
          <div class="prod-meta">/ 40</div>
        </div>
        <div class="prod-sub">Ações executadas hoje</div>
        <div class="prod-bar-wrap">
          <div class="prod-bar" id="prod-dia-bar" style="width:0%"></div>
        </div>
        <div class="prod-status" id="prod-dia-status">◉ EM PROGRESSO</div>
      </div>

      <div class="prod-card total">
        <div class="prod-title">Meta Geral — 1.200 até 10/06</div>
        <div class="prod-numbers">
          <div class="prod-current" id="prod-total">0</div>
          <div class="prod-meta">/ 1200 <span class="prod-pct" id="prod-total-pct">0%</span></div>
        </div>
        <div class="prod-sub" id="prod-total-faltam">Carregando...</div>
        <div class="prod-bar-wrap">
          <div class="prod-bar" id="prod-total-bar" style="width:0%"></div>
        </div>
        <div class="prod-status" id="prod-total-status">◉ EM PROGRESSO</div>
        <div class="prod-deadline" id="prod-deadline"></div>
      </div>
    </div>

    <div class="charts-grid">
      <div class="chart-card full">
        <div class="chart-title">Funil de Conversão</div>
        <div class="funil-wrap" id="funil-wrap"></div>
      </div>
      <div class="chart-card">
        <div class="chart-title">Pipeline por Status</div>
        <div class="chart-wrap"><canvas id="chart-status" height="200"></canvas></div>
      </div>
      <div class="chart-card">
        <div class="chart-title">Por Nicho</div>
        <div class="chart-wrap"><canvas id="chart-nicho" height="200"></canvas></div>
      </div>
    </div>
  `;
  atualizarCardsProdutividadeVisual();
  renderizarGraficos();
}

function contabilizarAbordagem() {
  rodadaStatus.bait += 1;
  rodadaStatus.total = rodadaStatus.bait + rodadaStatus.reveal;
  localStorage.setItem('doug_rodada', JSON.stringify(rodadaStatus));
  atualizarCardsProdutividadeVisual();
}

function atualizarCardsProdutividadeVisual() {
  if(!document.getElementById('prod-bait')) return;
  
  document.getElementById('prod-bait').innerText = rodadaStatus.bait;
  document.getElementById('prod-reveal').innerText = rodadaStatus.reveal;
  document.getElementById('prod-dia').innerText = rodadaStatus.total;
  const pctBait = Math.min((rodadaStatus.bait / 20) * 100, 100);
  const pctReveal = Math.min((rodadaStatus.reveal / 20) * 100, 100);
  const pctDia = Math.min((rodadaStatus.total / 40) * 100, 100);

  document.getElementById('prod-bait-bar').style.width = `${pctBait}%`;
  document.getElementById('prod-reveal-bar').style.width = `${pctReveal}%`;
  document.getElementById('prod-dia-bar').style.width = `${pctDia}%`;
  if(rodadaStatus.bait >= 20) document.getElementById('prod-bait-status').innerText = "✓ METAS ATINGIDAS";
  if(rodadaStatus.reveal >= 20) document.getElementById('prod-reveal-status').innerText = "✓ METAS ATINGIDAS";
  if(rodadaStatus.total >= 40) document.getElementById('prod-dia-status').innerText = "✓ CONCLUÍDO";
}

async function salvarAlteracoesLead() {
  if (!currentLead) return;
  const status = document.getElementById('status-input').value;
  const canal = document.getElementById('canal-input').value;
  const observacao = document.getElementById('obs-input').value;

  showToast("Salvando dados na nuvem...");
  try {
    const res = await fetch(WEB_APP_URL, {
      method: 'POST',
      body: JSON.stringify({ action: 'updateLead', id: currentLead.id, status, canal, observacao })
    });
    const r = await res.json();
    if (r.success) {
      showToast("Dados updated com sucesso!");
      await carregarLeads();
    } else {
      showToast("Erro: " + r.error);
    }
  } catch(e) {
    showToast("Erro de conexão ao salvar");
  }
}

function copiarTexto(el) {
  if (el.id === 'card-reveal' && document.getElementById('text-reveal').classList.contains('script-blur')) {
    document.getElementById('text-reveal').classList.remove('script-blur');
    document.getElementById('overlay-reveal').style.display = 'none';
    rodadaStatus.reveal += 1;
    rodadaStatus.total = rodadaStatus.bait + rodadaStatus.reveal;
    localStorage.setItem('doug_rodada', JSON.stringify(rodadaStatus));
    atualizarCardsProdutividadeVisual();
    return;
  }
  const txt = el.innerText.replace('⚡ Clique para liberar após enviar o Bait', '').trim();
  navigator.clipboard.writeText(txt);
  showToast("Copiado para a área de transferência!");
}

function atualizarDashboard() {
  const totalContratos = allLeads.filter(l => l.Status === 'Fechado').length;
  const pctGeral = Math.min((totalContratos / 1200) * 100, 100).toFixed(1);

  if(document.getElementById('prod-total')) {
    document.getElementById('prod-total').innerText = totalContratos;
    document.getElementById('prod-total-pct').innerText = `${pctGeral}%`;
    document.getElementById('prod-total-bar').style.width = `${pctGeral}%`;
    document.getElementById('prod-total-faltam').innerText = `Faltam ${1200 - totalContratos} contratos para atingir o objetivo comercial`;
    
    const prazo = new Date("2026-06-10T23:59:59");
    const diff = prazo - new Date();
    const dias = Math.ceil(diff / (1000 * 60 * 60 * 24));
    document.getElementById('prod-deadline').innerText = dias > 0 ? `Restam ${dias} dias de campanha` : "Campanha encerrada";
  }
}

function renderizarGraficos() {
  const statusContagem = { Novo: 0, Abordado: 0, Reuniao: 0, Fechado: 0, Perdido: 0 };
  const nichoContagem = {};

  allLeads.forEach(l => {
    if(statusContagem[l.Status] !== undefined) statusContagem[l.Status]++;
    if(l.Nicho) nichoContagem[l.Nicho] = (nichoContagem[l.Nicho] || 0) + 1;
  });
  const total = allLeads.length || 1;
  const stages = [
    { label: 'Prospecção', num: allLeads.length },
    { label: 'Contatados', num: allLeads.filter(l=>['Abordado','Reuniao','Fechado'].includes(l.Status)).length },
    { label: 'Reuniões', num: allLeads.filter(l=>['Reuniao','Fechado'].includes(l.Status)).length },
    { label: 'Fechados', num: statusContagem.Fechado }
  ];
  const funilContainer = document.getElementById('funil-wrap');
  if(funilContainer) {
    funilContainer.innerHTML = '';
    stages.forEach(s => {
      const pct = ((s.num / total) * 100).toFixed(0);
      funilContainer.innerHTML += `
        <div class="funil-stage">
          <div class="funil-label">${s.label}</div>
          <div class="funil-bar-bg">
            <div class="funil-bar" style="width:${pct}%"></div>
            <div class="funil-num">${s.num} (${pct}%)</div>
          </div>
        </div>
      `;
    });
  }

  const ctxStatus = document.getElementById('chart-status');
  if (ctxStatus) {
    if(chartStatusInstance) chartStatusInstance.destroy();
    chartStatusInstance = new Chart(ctxStatus, {
      type: 'doughnut',
      data: {
        labels: Object.keys(statusContagem),
        datasets: [{
          data: Object.values(statusContagem),
          backgroundColor: ['#00c896', '#ffb400', '#0096ff', '#c800ff', '#ff0032'],
          borderWidth: 0
        }]
      },
      options: { responsive: true, maintainAspectRatio: false, plugins: { legend: { display: false } } }
    });
  }

  const ctxNicho = document.getElementById('chart-nicho');
  if (ctxNicho) {
    if(chartNichoInstance) chartNichoInstance.destroy();
    chartNichoInstance = new Chart(ctxNicho, {
      type: 'bar',
      data: {
        labels: Object.keys(nichoContagem),
        datasets: [{
          data: Object.values(nichoContagem),
          backgroundColor: '#00c896',
          borderRadius: 4
        }]
      },
      options: { responsive: true, maintainAspectRatio: false, plugins: { legend: { display: false } }, scales: { y: { display: false }, x: { grid: { display: false } } } }
    });
  }
}

async function dispararAutomacao() {
  const btn = document.getElementById('btn-trigger');
  btn.disabled = true;
  
  let tempo = 45;
  btn.innerText = `⏳ Aguarde, seu lead está a caminho (${tempo}s)...`;
  const timer = setInterval(() => {
    tempo--;
    if(tempo > 0) {
      btn.innerText = `⏳ Aguarde, seu lead está a caminho (${tempo}s)...`;
    } else {
      clearInterval(timer);
      btn.innerText = `⚡ Gerar Leads`;
      btn.disabled = false;
    }
  }, 1000);
  try {
    await fetch(WEBHOOK_URL, { method: 'POST', mode: 'no-cors' });
    showToast("Disparo realizado! Atualizando dados em instantes...");
    setTimeout(async () => {
      await carregarLeads();
    }, 45000);
  } catch (e) {
    showToast("Erro ao chamar o robô Extrator");
  }
}

function showToast(msg) {
  const t = document.getElementById('toast');
  document.getElementById('toast-msg').innerText = msg;
  t.classList.add('show');
  setTimeout(() => t.classList.remove('show'), 4000);
}

window.onload = init;
</script>
